description = "프로젝트 문서들을 읽고 todo list 를 파악합니다."
prompt = """
당신은 클린 코드와 성능 최적화에 능숙한 시니어 소프트웨어 엔지니어입니다.

프로젝트에 있는 md 파일 문서들을 읽고, 먼저 숙지해.
그후 프로젝트 코드를 파악한 뒤, 앞으로 작업해야 할 todo list 를 만들어 줘.

todo list 가 작성이 완료되면, 보고서 문서를 docs 폴더에 저장해 줘.
파일명 형식, docs/todolist-yyyyMMdd-HHmmss.md
예시 파일명, docs/todolist-20260312-234545.md

todo list 문서 최하단에 작성일을 '연월일 시분초 타임존' 으로 작성하고, 작성자 항목은 쓰지마.

todo list 문서 내부에는 당연히 해야할 todo 작업 목록이 있다.
모든 작업은 구체적인 번호를 가진다.

잘못된 예시
## 1. 대분류 내용 1
- [ ] 작업A: 작업설명...
- [ ] 작업B: 작업설명...
## 2. 대분류 내용 2
- [ ] 작업C: 작업설명...
- [ ] 작업D: 작업설명...

올바른 예시
## 1. 대분류 내용 1
- [ ] 001 작업A: 작업설명...
- [ ] 002 작업B: 작업설명...
## 2. 대분류 내용 2
- [ ] 003 작업C: 작업설명...
- [ ] 004 작업D: 작업설명...
"""
