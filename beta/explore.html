<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- SEO & SNS Meta Tags -->
    <title>야미덱스 YummyDex - 탐색</title>
    <meta name="description" content="미식가들의 맛 표현 인덱스, 야미덱스 YummyDex">
    <meta property="og:title" content="야미덱스 YummyDex - 미식가들의 맛 표현 인덱스">
    <meta property="og:description" content="맛을 기록하고 공유하는 미식가들의 공간">
    <meta property="og:image" content="https://danielk0121.github.io/yummydex/beta/thumbnail/thumbnail.png">
    <meta property="og:url" content="https://danielk0121.github.io/yummydex/beta/">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:site_name" content="yummydex">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="style.css?v=260315-1944"></head>
<body>

<div class="app-frame">
    <!-- 상단 내비게이션 -->
    <div class="top-nav">
        <div class="mark-btn-wrap">
            <button class="mark-btn" onclick="switchScreen('mark')">
                <span style="font-size:28px; font-weight:300;">+</span>
            </button>
        </div>
        <button class="nav-item" onclick="switchScreen('home')">
            <span class="nav-icon">🏠</span>
        </button>
        <button class="nav-item active" onclick="switchScreen('explore')">
            <span class="nav-icon">🔍</span>
        </button>
        <button class="nav-item" onclick="switchScreen('profile')">
            <span class="nav-icon">😋</span>
        </button>
    </div>

    <div class="screens-container">
        <!-- ========== 2. 탐색 화면 ========== -->
        <div class="screen active" id="screen-explore">
            <div class="screen-header">
                탐색
                <small>맛 태그로 찾는 논리적 미식 큐레이션</small>
                <div class="dev-badge">
                    <div class="dev-name">danielk0121</div>
                    <div class="dev-ver">v-260316-0749</div>
                </div>
            </div>
            <div class="search-bar-wrap">
                <div class="search-input-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-bar" id="exploreSearchInput" placeholder="맛, 식감, 재료로 검색..." onkeyup="handleSearchKeyUp(event)">
                </div>
                <button class="search-add-btn" onclick="addSearchTag()">검색</button>
            </div>
            <div class="active-tags" id="activeSearchTags"></div>
            <div class="filter-chips">
                <button class="filter-reset-btn" onclick="resetFilters()">↻</button>
                <button class="filter-chip active">🔥 전체</button>
                <button class="filter-chip" onclick="toggleChip(this)">🍯 단맛</button>
                <button class="filter-chip" onclick="toggleChip(this)">🧂 짠맛</button>
                <button class="filter-chip" onclick="toggleChip(this)">🌶️ 매운맛</button>
                <button class="filter-chip" onclick="toggleChip(this)">🔥 바삭</button>
                <button class="filter-chip" onclick="toggleChip(this)">🧈 고소</button>
                <button class="filter-chip" onclick="toggleChip(this)">☁️ 부드러움</button>
                <button class="filter-chip" onclick="toggleChip(this)">🦑 쫄깃</button>
            </div>

            <!-- [NEW] 검색 결과 없음 빈 상태 -->
            <div id="exploreEmptyState" class="empty-state" style="display: none; padding: 60px 20px; text-align: center;">
                <div class="empty-icon" style="font-size: 48px; margin-bottom: 16px;">🍱?</div>
                <div class="empty-text">
                    <strong style="display: block; font-size: 16px; color: #1d1d1f; margin-bottom: 8px;">찾으시는 맛이 아직 없네요</strong>
                    <p style="font-size: 13px; color: #636366; line-height: 1.5;">다른 맛 키워드로 검색하거나<br>필터를 초기화해보세요!</p>
                </div>
                <button class="empty-reset-btn" onclick="resetFilters()" style="margin-top: 24px; padding: 10px 20px; background: #ff6b35; color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer;">필터 초기화 ↻</button>
            </div>

            <div class="explore-grid" id="exploreGrid">
                <div class="explore-card">
                    <div class="explore-card-img">
                        <img src="../docs/sample/salad-04.jpg" alt="Food">
                    </div>
                    <div class="explore-card-info">
                        <div class="card-title">프레쉬 연어 아보카도 볼</div>
                        <div class="card-restaurant">🌿 그린 가든</div>
                        <div class="card-loc">강남구 역삼동</div>
                        <div class="card-tags">
                            <span class="mini-tag taste-tag savory">신선</span>
                            <span class="mini-tag taste-tag mild">부드러움</span>
                        </div>
                    </div>
                </div>
                <div class="explore-card">
                    <div class="explore-card-img">
                        <img src="../docs/sample/food-05.jpg" alt="Food">
                    </div>
                    <div class="explore-card-info">
                        <div class="card-title">수비드 채끝 스테이크</div>
                        <div class="card-restaurant">🥩 스테이크 하우스</div>
                        <div class="card-loc">성동구 성수동</div>
                        <div class="card-tags">
                            <span class="mini-tag taste-tag rich">진함</span>
                            <span class="mini-tag taste-tag salty">짭짤</span>
                        </div>
                    </div>
                </div>
                <div class="explore-card">
                    <div class="explore-card-img">
                        <img src="../docs/sample/food-06.jpg" alt="Food">
                    </div>
                    <div class="explore-card-info">
                        <div class="card-title">크로플 크림</div>
                        <div class="card-tags">
                            <span class="mini-tag taste-tag sweet">달콤</span>
                            <span class="mini-tag taste-tag crispy">바삭</span>
                        </div>
                    </div>
                </div>
                <div class="explore-card">
                    <div class="explore-card-img">
                        <img src="../docs/sample/pasta-03.jpg" alt="Food">
                    </div>
                    <div class="explore-card-info">
                        <div class="card-title">지중해식 콜드 파스타</div>
                        <div class="card-restaurant">🍝 카페 블룸</div>
                        <div class="card-loc">송파구 잠실동</div>
                        <div class="card-tags">
                            <span class="mini-tag taste-tag mild">부드러움</span>
                            <span class="mini-tag taste-tag savory">신선</span>
                        </div>
                    </div>
                </div>
                <div class="explore-card">
                    <div class="explore-card-img">
                        <img src="../docs/sample/food-08.jpg" alt="Food">
                    </div>
                    <div class="explore-card-info">
                        <div class="card-title">한우 꽃등심 마블링</div>
                        <div class="card-tags">
                            <span class="mini-tag taste-tag savory">고소</span>
                            <span class="mini-tag taste-tag rich">진함</span>
                        </div>
                    </div>
                </div>
                <div class="explore-card">
                    <div class="explore-card-img">
                        <img src="../docs/sample/food-09.jpg" alt="Food">
                    </div>
                    <div class="explore-card-info">
                        <div class="card-title">라멘 차슈</div>
                        <div class="card-tags">
                            <span class="mini-tag taste-tag savory">고소</span>
                            <span class="mini-tag taste-tag mild">부드러움</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 토스트 알림 -->
    <div class="toast" id="toast"></div>
</div>

<script src="script.js?v=260315-1944"></script>
