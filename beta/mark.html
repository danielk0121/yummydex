<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- SEO & SNS Meta Tags -->
    <title>야미덱스 YummyDex - 맛 표현</title>
    <meta name="description" content="미식가들의 맛 표현 인덱스, 야미덱스 YummyDex">
    <meta property="og:title" content="야미덱스 YummyDex - 미식가들의 맛 표현 인덱스">
    <meta property="og:description" content="맛을 기록하고 공유하는 미식가들의 공간">
    <meta property="og:image" content="https://danielk0121.github.io/yummydex/beta/thumbnail/thumbnail.png">
    <meta property="og:url" content="https://danielk0121.github.io/yummydex/beta/">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:site_name" content="yummydex">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css?v=260315-2157"></head>
<body>

<div class="app-frame">
    <!-- 상단 내비게이션 -->
    <div class="top-nav">
        <div class="mark-btn-wrap">
            <button class="mark-btn active" onclick="switchScreen('mark')">
                <span style="font-size:28px; font-weight:300;">+</span>
            </button>
        </div>
        <button class="nav-item" onclick="switchScreen('home')">
            <span class="nav-icon">🏠</span>
        </button>
        <button class="nav-item" onclick="switchScreen('explore')">
            <span class="nav-icon">🔍</span>
        </button>
        <button class="nav-item" onclick="switchScreen('profile')">
            <span class="nav-icon">😋</span>
        </button>
    </div>

    <div class="screens-container">
        <!-- ========== 3. 맛 표현(촬영) 화면 ========== -->
        <div class="screen active marking-screen" id="screen-mark">
            <!-- 버전 정보 (상단 고정 스타일 참고) -->
            <div class="dev-badge" style="z-index: 100;">
                <div class="dev-name">danielk0121</div>
                <div class="dev-ver">v-260316-0802</div>
            </div>
            <div class="marking-steps">
                <span class="marking-step current" id="step1">① 찍기</span>
                <span class="marking-step" id="step2">② 맛 표현</span>
                <span class="marking-step" id="step3">③ 맛 뱉기</span>
                <span class="marking-step" id="step4">④ 위치</span>
            </div>
            <div class="camera-area" id="cameraMode">
                <div class="camera-placeholder">
                    <div class="cam-icon">📸</div>
                    <div class="cam-text">터치하여 음식을 촬영하세요</div>
                </div>
            </div>
            <div class="camera-controls" id="cameraControls">
                <button class="cam-option">🖼️</button>
                <button class="shutter-btn" onclick="takePhoto()"></button>
                <button class="cam-option">🔄</button>
            </div>
            <div class="marking-overlay" id="markingMode">
                <div class="marking-image-area" id="markingArea">
                    <img src="../docs/sample/food-19.jpg" alt="Photo" style="width:100%; height:100%; object-fit:cover;">
                    <div class="marking-guide" id="markingGuide">📸 미식 포인트를 확인했어요!</div>
                </div>
                <div class="taste-panel" id="tastePanel">
                    <div class="taste-panel-header">
                        <h3>맛 뱉기 🗣️</h3>
                        <p>느껴지는 맛을 툭툭 골라주세요! 점수는 AI가 알아서 매겨줘요</p>
                    </div>
                    <div class="taste-category-label">👅 기본 미각</div>
                    <div class="taste-grid">
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🍯</span>단맛</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🧂</span>짠맛</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🍋</span>신맛</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🍄</span>감칠맛</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">☕</span>쓴맛</button>
                    </div>
                    <div class="taste-category-label">🦷 식감</div>
                    <div class="taste-grid">
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🌶️</span>매운맛</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🔥</span>바삭함</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🦑</span>쫄깃함</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">☁️</span>부드러움</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🍯</span>꾸덕함</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🥓</span>기름짐</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🌿</span>신선도</button>
                    </div>
                    <div class="taste-category-label">👃 풍미/향</div>
                    <div class="taste-grid">
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🧀</span>치즈/우유</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🧈</span>버터향</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🔥</span>불맛</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🌿</span>향신료</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🥜</span>고소함</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🥩</span>육향</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🌊</span>해물향</button>
                        <button class="taste-option" onclick="toggleTaste(this)"><span class="t-emoji">🍓</span>과일/상큼</button>
                    </div>
                    <div class="selected-tags-preview" id="selectedTagsPreview"></div>
                    <button class="upload-btn" onclick="completeUpload()">기록 완료! ✨</button>
                </div>
                <div class="location-panel" id="locationPanel">
                    <div class="location-panel-header">
                        <h3>📍 위치 기록</h3>
                        <p>이 맛집의 위치를 지도에 저장할까요?</p>
                    </div>
                    <div class="location-map-wrap">
                        <div id="markingMap"></div>
                        <div class="map-loading-overlay" id="mapLoadingOverlay">
                            <div class="map-loading-icon">📍</div>
                            <div class="map-loading-text">위치 확인 중...</div>
                        </div>
                    </div>
                    <div class="location-info-bar">
                        <span class="location-info-icon">📍</span>
                        <div class="location-info-text">
                            <div class="location-info-name" id="locationInfoName">위치를 불러오는 중...</div>
                            <div class="location-info-coords" id="locationInfoCoords"></div>
                        </div>
                    </div>
                    <div class="location-action-btns">
                        <button class="btn-location-skip" onclick="skipLocation()">건너뛰기</button>
                        <button class="btn-location-confirm" onclick="confirmLocation()">위치 저장 ✨</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 토스트 알림 -->
    <div class="toast" id="toast"></div>
</div>

<script src="script.js?v=260315-2157"></script>
</body>
</html>
