<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YummyDex Thumbnail Capture Tool</title>
    <style>
        /* 캡처를 위한 기본 스타일 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 400px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ff6b35; /* 단색 주황색 배경 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
            overflow: hidden;
            color: #fff; /* 흰색 글자 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .content-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px; /* 줄간격 10픽셀 */
        }

        .english {
            font-size: 40px; /* 영어 40픽셀 */
            font-weight: 800;
            letter-spacing: 1px;
            animation: fadeIn 0.8s ease-out;
        }

        .korean {
            font-size: 60px; /* 한글 60픽셀 */
            font-weight: 900;
            letter-spacing: -2px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .tagline {
            font-size: 20px; /* 하단 설명 20픽셀 */
            font-weight: 600;
            opacity: 0.9;
            letter-spacing: 0.5px;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 캡처 가이드 (브라우저 확인용) */
        .capture-guide {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            opacity: 0.3;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="content-container">
        <div class="english">YummyDex</div>
        <div class="korean">야미덱스</div>
        <div class="tagline">미식가들의 맛 표현 인덱스</div>
    </div>
    <div class="capture-guide">400x400 px</div>
</body>
</html>
